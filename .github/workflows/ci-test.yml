name: CI - Test

on:
  push:
    branches: [ test ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push gateway
        uses: docker/build-push-action@v5
        with:
          context: ./gateway
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}/gateway:test

      - name: Build & push text-service
        uses: docker/build-push-action@v5
        with:
          context: ./services/text-service
          push: true
          tags: ghcr.io/${{ github.actor }}/${{ github.event.repository.name }}/text-service:test
