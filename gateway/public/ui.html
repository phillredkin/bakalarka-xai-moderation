<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XAI Moderation</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-zinc-100 text-zinc-900">
<div class="mx-auto max-w-4xl px-4 py-12">

  <div class="mb-10">
    <h1 class="text-3xl font-semibold tracking-tight">XAI Moderation</h1>
    <p class="mt-2 text-sm text-zinc-500">
      Transparent moderation across text, image, audio, and video
    </p>
  </div>

  <div class="mb-8 flex gap-3">
    <button id="tabText"
      class="tab-btn rounded-full px-5 py-2 text-sm font-medium shadow">
      Text
    </button>

    <button id="tabImage"
      class="tab-btn rounded-full px-5 py-2 text-sm font-medium shadow">
      Image
    </button>

    <button id="tabAudio"
      class="tab-btn rounded-full px-5 py-2 text-sm font-medium shadow">
      Audio
    </button>

    <button id="tabVideo"
      class="tab-btn rounded-full px-5 py-2 text-sm font-medium shadow">
      Video
    </button>
  </div>

  <!-- TEXT SERIVE -->
  <section class="bg-white rounded-2xl shadow-lg p-6">

    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Text analysis</h2>
    </div>

    <label class="block text-sm text-zinc-600 mb-2">Paste text</label>
    <textarea id="textInput"
      class="w-full min-h-40 rounded-xl bg-zinc-50 px-4 py-3 text-sm text-zinc-900 placeholder:text-zinc-400 focus:outline-none focus:ring-2 focus:ring-zinc-300"
      placeholder="Type something..."></textarea>

    <div class="mt-4 flex items-center gap-3">
      <button id="submitText"
        class="rounded-xl bg-zinc-900 text-white px-5 py-2 text-sm font-medium hover:bg-zinc-800 disabled:opacity-50">
        Analyze
      </button>

      <button id="clearText"
        class="rounded-xl bg-zinc-100 px-5 py-2 text-sm font-medium text-zinc-700 hover:bg-zinc-200">
        Clear
      </button>

      <span id="statusText" class="text-sm text-zinc-500"></span>
    </div>

    <div id="resultSection" class="mt-8 hidden">
      <h3 class="text-sm font-semibold text-zinc-700 mb-2">Result</h3>

      <div id="resultBox"
        class="rounded-xl bg-zinc-50 p-5 shadow-inner text-zinc-800">
      </div>
    </div>

  </section>


  <!-- AUDIO SERVICE -->
  <section id="audioSection" class="bg-white rounded-2xl shadow-lg p-6 mt-10 hidden">

    <div class="flex items-center justify-between mb-4">
      <h2 class="text-lg font-semibold">Audio analysis</h2>
    </div>

    <div id="audioDropArea"
      class="flex flex-col items-center justify-center border-2 border-dashed border-zinc-300 rounded-xl p-10 bg-zinc-50 transition hover:bg-zinc-100 cursor-pointer">

      <svg width="64px" height="64px" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><g id="SVGRepo_bgCarrier" stroke-width="0"></g><g id="SVGRepo_tracerCarrier" stroke-linecap="round" stroke-linejoin="round"></g><g id="SVGRepo_iconCarrier"> <path d="M13 14H8.81763C7.20089 14 5.83017 15.1888 5.60153 16.7893V16.7893C5.29858 18.9099 7.09499 20.7381 9.22059 20.4724L9.77821 20.4027C11.6188 20.1727 13 18.608 13 16.7531V7.38851C13 5.77017 13 4.961 13.474 4.4015C13.9479 3.84201 14.7461 3.70899 16.3424 3.44293L18.6991 3.05015C18.8349 3.02751 18.9028 3.01619 18.9395 3.05588C18.9761 3.09557 18.9594 3.16236 18.926 3.29593L18.0307 6.87721C18.0158 6.93689 18.0083 6.96672 17.9873 6.98673C17.9664 7.00673 17.9362 7.01276 17.8759 7.02482L13 8" stroke="#33363F" stroke-width="2"></path> </g></svg>

      
      <p class="mt-4 text-sm text-zinc-600">
        Drag & Drop audio file here
      </p>

      <p class="text-xs text-zinc-400 mt-1">
        MP3 or WAV
      </p>

      <input type="file" id="audioInput" accept="audio/*" hidden />
    </div>

    <div id="audioFileInfo" class="mt-6 hidden">
      <div class="flex justify-between items-center bg-zinc-100 rounded-xl px-4 py-3 text-sm">
        <span id="audioFileName"></span>
        <button id="removeAudio"
          class="text-red-600 hover:text-red-700 font-medium">
          Remove
        </button>
      </div>
    </div>

    <div class="mt-6">
      <button id="submitAudio"
        class="rounded-xl bg-zinc-900 text-white px-6 py-2 text-sm font-medium hover:bg-zinc-800 disabled:opacity-50">
        Analyze Audio
      </button>
    </div>

    <div id="audioResultSection" class="mt-8 hidden">
      <h3 class="text-sm font-semibold text-zinc-700 mb-2">Result</h3>

      <div id="audioResultBox"
        class="rounded-xl bg-zinc-50 p-5 shadow-inner text-zinc-800">
      </div>
    </div>

  </section>

</div>

<script>
function escapeRegExp(text) {
  return text.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

const textInput = document.getElementById("textInput");
const submitBtn = document.getElementById("submitText");
const clearBtn = document.getElementById("clearText");
const statusText = document.getElementById("statusText");
const resultBox = document.getElementById("resultBox");
const resultSection = document.getElementById("resultSection");

resultSection.classList.add("hidden");

clearBtn.onclick = () => {
  textInput.value = "";
  statusText.textContent = "";
  resultBox.innerHTML = "";
  resultSection.classList.add("hidden");
};

submitBtn.onclick = async () => {
  const text = textInput.value.trim();
  if (!text) {
    statusText.textContent = "Enter text first";
    return;
  }

  submitBtn.disabled = true;
  statusText.textContent = "Analyzing...";
  resultSection.classList.add("hidden");

  try {
    const res = await fetch("/api/v1/text/analyze", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();
    renderVisualResult(text, data.data);
    statusText.textContent = "Done ✓";
    resultSection.classList.remove("hidden");

  } catch {
    resultBox.innerHTML = `<span class="text-red-600">Service error</span>`;
    resultSection.classList.remove("hidden");
    statusText.textContent = "Error";
  } finally {
    submitBtn.disabled = false;
  }
};

function renderVisualResult(originalText, apiData) {
  const confidence = apiData.confidence || 0;

  let verdict, color;
  if (confidence < 40) {
    verdict = "Not toxic";
    color = "text-green-600";
  } else if (confidence < 70) {
    verdict = "Possibly toxic";
    color = "text-orange-500";
  } else {
    verdict = "Toxic";
    color = "text-red-600";
  }

  const words = apiData.toxic_keywords || [];

  if (!words.length) {
    resultBox.innerHTML = `
      <div class="mb-4">
        <div class="text-4xl font-semibold ${color}">${confidence}%</div>
        <div class="text-sm ${color}">${verdict}</div>
      </div>
      <div class="text-sm leading-relaxed">${originalText}</div>
    `;
    return;
  }

  const percents = words.map(w => w.percent);
  const minP = Math.min(...percents);
  const maxP = Math.max(...percents);

  const percentMap = new Map(words.map(w => [w.token.toLowerCase(), w.percent]));
  const tokens = originalText.split(/(\s+)/);

  const html = tokens.map(token => {
  const clean = token.toLowerCase().replace(/[^\w']/g, "");
    if (!percentMap.has(clean)) return token;

    const p = percentMap.get(clean);
    const t = (p - minP) / (maxP - minP || 1);
    const alpha = 0.1 + t * 0.7;

      return `
        <span
          title="Impact: ${p}%"
          style="background:rgba(220,38,38,${alpha});
                padding:2px 4px;
                border-radius:4px;
                font-weight:500;
                cursor:help;">
          ${token}
        </span>
      `;
  }).join("");

  resultBox.innerHTML = `
    <div class="mb-4">
      <div class="text-4xl font-semibold ${color}">${confidence}%</div>
      <div class="text-sm ${color}">${verdict}</div>
    </div>
    <div class="text-sm leading-relaxed">${html}</div>
  `;
}
</script>


<script>
  const audioSection = document.getElementById("audioSection");
  const audioDropArea = document.getElementById("audioDropArea");
  const audioInput = document.getElementById("audioInput");
  const audioFileInfo = document.getElementById("audioFileInfo");
  const audioFileName = document.getElementById("audioFileName");
  const removeAudio = document.getElementById("removeAudio");
  const submitAudio = document.getElementById("submitAudio");
  const audioResultSection = document.getElementById("audioResultSection");
  const audioResultBox = document.getElementById("audioResultBox");

  let selectedAudioFile = null;

  document.querySelectorAll("button")[2].addEventListener("click", () => {
    document.querySelector("section").classList.add("hidden");
    audioSection.classList.remove("hidden");
  });

  audioDropArea.addEventListener("click", () => audioInput.click());

  audioDropArea.addEventListener("dragover", e => {
    e.preventDefault();
    audioDropArea.classList.add("bg-zinc-200");
  });

  audioDropArea.addEventListener("dragleave", () => {
    audioDropArea.classList.remove("bg-zinc-200");
  });

  audioDropArea.addEventListener("drop", e => {
    e.preventDefault();
    audioDropArea.classList.remove("bg-zinc-200");

    const file = e.dataTransfer.files[0];
    handleAudioFile(file);
  });

  audioInput.addEventListener("change", e => {
    const file = e.target.files[0];
    handleAudioFile(file);
  });

  function handleAudioFile(file) {
    if (!file) return;

    if (!file.type.startsWith("audio/")) {
      alert("Only audio files allowed");
      return;
    }

    selectedAudioFile = file;
    audioFileName.textContent = file.name;
    audioFileInfo.classList.remove("hidden");
  }

  removeAudio.onclick = () => {
    selectedAudioFile = null;
    audioFileInfo.classList.add("hidden");
    audioInput.value = "";
    audioResultSection.classList.add("hidden");
  };

	submitAudio.onclick = async () => {
		if (!selectedAudioFile) {
			return alert("Select audio first");
		}

		submitAudio.disabled = true;
		audioResultSection.classList.remove("hidden");
		audioResultBox.innerHTML = "Transcription + analysis...";

		try {
		const fd = new FormData();
		fd.append("file", selectedAudioFile);

		const res = await fetch("/api/v1/audio/analyze", {
			method: "POST",
			body: fd
		});

		const data = await res.json();

		if (!data.audio || !data.moderation) {
			throw new Error("Invalid response");
		}

		renderVisualResult(
			data.audio.text,
			data.moderation.data
		);

		audioResultBox.innerHTML = resultBox.innerHTML;

		} catch (e) {
		audioResultBox.innerHTML =
			`<span class="text-red-600">Service error</span>`;
		} finally {
		submitAudio.disabled = false;
		}
	};


</script>


<script>
  const tabText = document.getElementById("tabText");
  const tabAudio = document.getElementById("tabAudio");
  const tabImage = document.getElementById("tabImage");
  const tabVideo = document.getElementById("tabVideo");

  const textSection = document.querySelector("section");
  const audioSectionEl = document.getElementById("audioSection");

  function setActiveTab(activeTab) {
    const tabs = document.querySelectorAll(".tab-btn");

    tabs.forEach(tab => {
      tab.classList.remove(
        "bg-zinc-900",
        "text-white",
        "hover:bg-zinc-100"
      );

      tab.classList.add(
        "bg-white",
        "text-zinc-600",
        "hover:bg-zinc-100"
      );
    });

    activeTab.classList.remove(
      "bg-white",
      "text-zinc-600",
      "hover:bg-zinc-100"
    );

    activeTab.classList.add(
      "bg-zinc-900",
      "text-white"
    );
  }


  function showSection(sectionName) {
    textSection.classList.add("hidden");
    audioSectionEl.classList.add("hidden");

    if (sectionName === "text") {
      textSection.classList.remove("hidden");
      setActiveTab(tabText);
    }

    if (sectionName === "audio") {
      audioSectionEl.classList.remove("hidden");
      setActiveTab(tabAudio);
    }
  }

  showSection("text");

  tabText.onclick = () => showSection("text");
  tabAudio.onclick = () => showSection("audio");
</script>

</body>
</html>
